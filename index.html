<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>Para Tamires 💕</title>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/index.css"/>
</head>
<body>

  <div class="mesh"></div>
  <div class="petals-bg" id="petals"></div>

  <div class="container">

    <header class="header">
      <p class="subtitle">Um presente com muito amor</p>
      <h1>Para <span>Tamires</span></h1>
      <div class="heart-line">🌸 💕 🌸</div>
    </header>

    <div class="timer-card">
      <p class="timer-label">Juntos há</p>
      <div class="timer-display">
        <div class="timer-unit">
          <span class="timer-number" id="days">000</span>
          <span class="timer-unit-label">dias</span>
        </div>
        <span class="timer-sep">·</span>
        <div class="timer-unit">
          <span class="timer-number" id="hours">00</span>
          <span class="timer-unit-label">horas</span>
        </div>
        <span class="timer-sep">·</span>
        <div class="timer-unit">
          <span class="timer-number" id="minutes">00</span>
          <span class="timer-unit-label">minutos</span>
        </div>
        <span class="timer-sep">·</span>
        <div class="timer-unit">
          <span class="timer-number" id="seconds">00</span>
          <span class="timer-unit-label">segundos</span>
        </div>
      </div>
      <p class="timer-since">desde 22 de fevereiro de 2025 ✨</p>
    </div>

    <nav class="menu">
      <a class="btn btn-rosa"
         href="https://open.spotify.com/track/1mSxbLW7fKABfeY4lGpg0E?si=rxuDYY-jThmn870K0reiFA&pi=PbzZpwlDRmypW"
         target="_blank" rel="noopener">
        <span class="btn-icon">🎵</span>
        <span class="btn-title">Nossa Música</span>
      </a>
      <a class="btn btn-amarelo" href="joguinho.html">
        <span class="btn-icon">🎯</span>
        <span class="btn-title">Joguinho</span>
      </a>
      <a class="btn btn-lavanda" href="euteamo.html">
        <span class="btn-icon">🌍</span>
        <span class="btn-title">Eu Te Amo</span>
      </a>
    </nav>

    <p class="footer">feito com todo amor do mundo 💗</p>

  </div>

  <script src="js/petals.js"></script>
  <script src="js/timer.js"></script>
</body>
</html>
